<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>streamctl</title>

<style>
:root {
    --bg: #0d0d0d;
    --fg: #c8c8c8;
    --green: #00ff87;
    --border: #2a2a2a;
    --selected: #1b1b1b;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: Menlo, Monaco, Consolas, monospace;
    overflow: hidden;
}

#topbar {
    height: 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    color: var(--green);
}

#main {
    display: flex;
    height: calc(100vh - 32px);
}

#sidebar {
    width: 420px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
}

#viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#status {
    height: 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    color: #888;
    overflow: hidden;
    white-space: nowrap;
}

iframe {
    flex: 1;
    border: 0;
    background: black;
}

.match {
    border-bottom: 1px solid #181818;
}

.match-header {
    padding: 10px;
    color: white;
}

.stream {
    padding: 6px 10px 6px 25px;
    cursor: pointer;
    color: #9d9d9d;
}

.stream:hover {
    background: var(--selected);
}

.stream.active {
    background: var(--selected);
    color: var(--green);
}

.stream::before {
    content: "> ";
}

#footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 10px;
    color: #666;
    font-size: 12px;
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-thumb {
    background: #222;
}
</style>
</head>

<body>

<div id="topbar">
streamctl v0.1
</div>

<div id="main">

    <div id="sidebar">
        <div id="matches"></div>
    </div>

    <div id="viewer">

        <div id="status">
            no stream selected
        </div>

        <iframe
            id="stream-player"
            allowfullscreen>
        </iframe>

    </div>

</div>

<div id="footer">
↑ ↓ navigate | Enter load stream
</div>

<script>

function loadStream(url, element) {

    document
        .querySelectorAll(".stream")
        .forEach(el => el.classList.remove("active"));

    element.classList.add("active");

    document.getElementById("stream-player").src = url;

    document.getElementById("status").textContent =
        url;
}

/*
Replace this later with:
fetch('/api/live')
*/

async function getlivematches(){
  const match = await (await fetch ("https://streamed.pk/api/matches/live")).json();
  return match;
}
const matches=getlivematches();
const container =
    document.getElementById("matches");

let streamNodes = [];

for (const match of matches) {

    const matchDiv =
        document.createElement("div");

    const title =
        document.createElement("div");

    title.className = "match-header";
    title.textContent = match.title;

    matchDiv.appendChild(title);

    for (const stream of match.streams) {

        const node =
            document.createElement("div");

        node.className = "stream";

        node.textContent =
            `stream ${stream.streamNo} | viewers ${stream.viewers}`;

        node.dataset.url =
            stream.embedUrl;

        node.onclick = () =>
            loadStream(stream.embedUrl, node);

        streamNodes.push(node);

        matchDiv.appendChild(node);
    }

    container.appendChild(matchDiv);
}

let current = 0;

function highlight(index) {

    streamNodes.forEach(
        n => n.classList.remove("active")
    );

    if (streamNodes[index]) {
        streamNodes[index]
            .classList.add("active");

        streamNodes[index]
            .scrollIntoView({
                block: "nearest"
            });
    }
}

highlight(current);

document.addEventListener("keydown", e => {

    if (e.key === "ArrowDown") {

        current =
            Math.min(
                current + 1,
                streamNodes.length - 1
            );

        highlight(current);
    }

    if (e.key === "ArrowUp") {

        current =
            Math.max(
                current - 1,
                0
            );

        highlight(current);
    }

    if (e.key === "Enter") {

        const node =
            streamNodes[current];

        loadStream(
            node.dataset.url,
            node
        );
    }
});

</script>

</body>
</html>
